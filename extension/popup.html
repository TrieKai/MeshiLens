<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MeshiLens</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <div class="title-row">
        <div class="brand-title">
          <img class="brand-logo" src="icons/icon-48.png" alt="" />
          <h1>MeshiLens</h1>
        </div>
        <span id="version" class="version">v—</span>
      </div>
      <p>在 Google Maps 顯示 Tabelog 評分與日本 Michelin Guide 入選資訊。</p>
      <section class="toggle-row">
        <div>
          <strong>顯示美食資訊</strong>
          <span id="enabled-state">已啟用</span>
        </div>
        <label class="switch" for="enabled">
          <input id="enabled" type="checkbox" role="switch" aria-label="啟用 MeshiLens" />
          <span class="switch-track" aria-hidden="true"></span>
        </label>
      </section>
      <div id="status" class="status checking">正在檢查本機服務…</div>
      <label>主題色</label>
      <div class="theme-colors" role="group" aria-label="選擇主題色">
        <button class="theme-swatch" type="button" data-theme-color="#bf3a2b" style="--swatch: #bf3a2b" aria-label="赤紅" aria-pressed="false"></button>
        <button class="theme-swatch" type="button" data-theme-color="#a65314" style="--swatch: #a65314" aria-label="橙色" aria-pressed="false"></button>
        <button class="theme-swatch" type="button" data-theme-color="#2f7658" style="--swatch: #2f7658" aria-label="綠色" aria-pressed="false"></button>
        <button class="theme-swatch" type="button" data-theme-color="#35649a" style="--swatch: #35649a" aria-label="藍色" aria-pressed="false"></button>
        <button class="theme-swatch" type="button" data-theme-color="#71549a" style="--swatch: #71549a" aria-label="紫色" aria-pressed="false"></button>
      </div>
      <label for="api-url">本機服務網址</label>
      <input id="api-url" type="url" value="https://meshilens.vercel.app/api" />
      <button id="save" type="button">儲存並重新檢查</button>
      <small>資料僅在你的瀏覽器、本機服務與 Tabelog 之間處理。</small>
    </main>
    <script src="settings.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
